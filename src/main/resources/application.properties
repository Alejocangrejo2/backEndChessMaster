# ============================================
# application.properties — Configuracion Spring Boot
# ============================================
# Usa variables de entorno para produccion (Railway),
# con valores por defecto para desarrollo local.

# === Servidor ===
server.port=${PORT:8080}

# === PostgreSQL ===
# Railway inyecta PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD automaticamente
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:chessdb}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:chessuser}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:chesspass123}}
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# === Jackson (JSON) ===
spring.jackson.serialization.write-dates-as-timestamps=false

# === JWT ===
jwt.secret=${JWT_SECRET:ChessMasterSecretKey2025SuperSecureKey256BitsMinimumRequiredHere!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# === CORS ===
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# === Logging (produccion) ===
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.chess=DEBUG
